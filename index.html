<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Management | Emailing Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- App content will be injected here -->
        <div id="login-screen" class="screen"></div>
        <div id="dashboard-screen" class="screen hidden">
            <aside id="sidebar"></aside>
            <main id="main-content">
                <header id="top-bar"></header>
                <div id="view-container"></div>
            </main>
        </div>
    </div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errDiv = document.createElement('div');
            errDiv.style = 'position:fixed; top:20px; left:20px; right:20px; background:rgba(255,0,0,0.9); color:white; padding:20px; border-radius:8px; z-index:10000; font-family:monospace;';
            errDiv.innerHTML = '<h3>Critical Script Error</h3>' + msg + '<br>Line: ' + lineNo + '<br>URL: ' + url;
            document.body.appendChild(errDiv);
            return false;
        };
    </script>
    <script src="components.js?v=2.0"></script>
    <script src="app.js?v=2.0"></script>
</body>
</html>
